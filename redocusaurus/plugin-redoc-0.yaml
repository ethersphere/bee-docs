  responses:
    '200':
      description: Success
    '204':
      description: The resource was deleted successfully.
    '400':
      description: Bad request
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    '401':
      description: Unauthorized
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    '402':
      description: Payment Required
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    '404':
      description: Not Found
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    '429':
      description: Too many requests
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    '500':
      description: Internal Server Error
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
  parameters:
    SwarmPostageBatchId: *ref_0
    SwarmTagParameter: *ref_1
    SwarmPinParameter: *ref_2
    SwarmDeferredUpload: *ref_3
    SwarmEncryptParameter:
      in: header
      name: swarm-encrypt
      schema:
        type: boolean
      required: false
      description: |
        Indicates whether the file should be encrypted
    SwarmRedundancyLevelParameter: *ref_4
    SwarmAct:
      in: header
      name: swarm-act
      schema:
        type: boolean
        default: 'false'
      required: false
      description: Determines if the uploaded data should be treated as ACT content
    SwarmActHistoryAddress: *ref_5
    SwarmCache: *ref_6
    SwarmRedundancyStrategyParameter:
      in: header
      name: swarm-redundancy-strategy
      schema:
        type: integer
        enum:
          - 0
          - 1
          - 2
          - 3
      required: false
      description: >
        Specify the retrieval strategy for redundant data. Values represent:
        NONE (0), DATA (1), PROX (2), RACE (3). NONE: no prefetching. DATA:
        prefetch only data chunks. PROX: prefetch chunks near this node. RACE:
        prefetch all chunks and use the first n to arrive. Multiple strategies
        can be cascaded if fallback mode is enabled. Default: NONE > DATA > PROX
        > RACE
    SwarmRedundancyFallbackModeParameter:
      in: header
      name: swarm-redundancy-fallback-mode
      schema:
        type: boolean
      required: false
      description: >
        Specify if the retrieve strategies (chunk prefetching on redundant data)
        are used in a fallback cascade. The default is true.
    SwarmChunkRetrievalTimeoutParameter:
      in: header
      name: swarm-chunk-retrieval-timeout
      schema:
        $ref: '#/components/schemas/Duration'
      required: false
      description: |
        Specify the timeout for chunk retrieval. The default is 30 seconds.
    SwarmLookaheadBufferSizeParameter:
      in: header
      name: swarm-lookahead-buffer-size
      schema:
        type: integer
      required: false
      description: >
        Override the lookahead buffer size used during retrieval, in bytes. When
        unset the node picks 8x or 16x the io.Copy default buffer (32 kB)
        depending on file size.
    SwarmActTimestamp:
      in: header
      name: swarm-act-timestamp
      schema:
        type: integer
        format: int64
      required: false
      description: ACT history Unix timestamp
    SwarmActPublisher:
      in: header
      name: swarm-act-publisher
      schema:
        $ref: '#/components/schemas/PublicKey'
      required: false
      description: ACT content publisher's public key
    SwarmPostageStamp:
      in: header
      name: swarm-postage-stamp
      description: |
        Postage stamp for the corresponding chunk in the request. \
        It is required if Swarm-Postage-Batch-Id header is missing \
        It consists of: \
        - batch ID - 0:32 bytes \
        - postage index (bucket and bucket index) - 32:40 bytes \
        - timestamp - 40:48 bytes \
        - signature - 48:113 bytes
      schema:
        $ref: '#/components/schemas/HexString'
    ContentTypePreserved:
      in: header
      name: Content-Type
      schema:
        type: string
      description: >-
        Single file: trimmed Content-Type is stored as-is or, if omitted or
        empty, inferred from the first bytes without validating against the
        body; tar (`swarm-collection`) and multipart collection uploads still
        need a full-body Content-Type (e.g. `application/x-tar` or
        `multipart/form-data` with boundary) so the request can be parsed.
    SwarmCollection:
      in: header
      name: swarm-collection
      schema:
        type: boolean
      required: false
      description: Upload file/files as a collection
    SwarmIndexDocumentParameter:
      in: header
      name: swarm-index-document
      schema:
        type: string
        example: index.html
      required: false
      description: Default file to serve when a directory path is accessed
    SwarmErrorDocumentParameter:
      in: header
      name: swarm-error-document
      schema:
        type: string
        example: error.html
      required: false
      description: >-
        Custom error document to return when a path is not found in the
        collection
    SwarmOnlyRootChunkParameter:
      in: header
      name: swarm-only-root-chunk
      schema:
        type: boolean
      required: false
      description: Returns only the root chunk of the content
    GasPriceParameter:
      in: header
      name: gas-price
      schema:
        $ref: '#/components/schemas/GasPrice'
      required: false
      description: Gas price for transaction
    GasLimitParameter:
      in: header
      name: gas-limit
      schema:
        $ref: '#/components/schemas/GasLimit'
      required: false
      description: Gas limit for transaction
  headers:
    SwarmTag:
      description: Tag UID
      schema:
        $ref: '#/components/schemas/Uid'
    SwarmActHistoryAddress:
      description: Swarm address reference to the new ACT history entry
      schema:
        $ref: '#/components/schemas/SwarmAddress'
      required: false
    ETag:
      description: |
        The RFC7232 ETag header field in a response provides the current entity-
        tag for the selected resource. An entity-tag is an opaque identifier for
        different versions of a resource over time, regardless whether multiple
        versions are valid at the same time. An entity-tag consists of an opaque
        quoted string, possibly prefixed by a weakness indicator.
      schema:
        type: string
    SwarmFeedResolvedVersion:
      schema:
        type: string
      required: false
      description: Indicates which feed version was resolved (v1 or v2)
    SwarmSocSignature:
      description: Attached digital signature of the Single Owner Chunk
      schema:
        $ref: '#/components/schemas/HexString'
    SwarmFeedIndex:
      description: The index of the found update
      schema:
        $ref: '#/components/schemas/HexString'
    SwarmFeedIndexNext:
      description: The index of the next possible update
      schema:
        $ref: '#/components/schemas/HexString'
