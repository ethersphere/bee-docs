components:
  schemas:
    SwarmPostageBatchId: &ref_0
      in: header
      name: swarm-postage-batch-id
      description: ID of Postage Batch that is used to upload data with
      required: true
      schema:
        $ref: '#/components/schemas/SwarmAddress'
    SwarmTagParameter: &ref_1
      in: header
      name: swarm-tag
      schema:
        $ref: '#/components/schemas/Uid'
      required: false
      description: Associate upload with an existing Tag UID
    SwarmPinParameter: &ref_2
      in: header
      name: swarm-pin
      schema:
        type: boolean
      required: false
      description: >
        Indicates whether the uploaded data should also be locally pinned on
        this node
    SwarmDeferredUpload: &ref_3
      in: header
      name: swarm-deferred-upload
      schema:
        type: boolean
        default: 'true'
      required: false
      description: >
        Indicates whether the uploaded data should be sent to the network
        immediately or deferred. Default: deferred (true)
    SwarmActHistoryAddress: &ref_5
      in: header
      name: swarm-act-history-address
      schema:
        $ref: '#/components/schemas/SwarmAddress'
      required: false
      description: ACT history reference address
    SwarmRedundancyLevelParameter: &ref_4
      in: header
      name: swarm-redundancy-level
      schema:
        type: integer
        enum:
          - 0
          - 1
          - 2
          - 3
          - 4
      required: false
      description: >
        Add redundancy to the data being uploaded so that downloaders can
        download it with better UX. 0 value is default and does not add any
        redundancy to the file.
    PublicKey:
      type: string
      pattern: ^[A-Fa-f0-9]{66}$
      example: 02ab7473879005929d10ce7d4f626412dad9fe56b0a6622038931d26bd79abf0a4
    ActGranteesCreateRequest:
      type: object
      properties:
        grantees:
          type: array
          items:
            $ref: '#/components/schemas/PublicKey'
    SwarmEncryptedReference:
      type: string
      pattern: ^[A-Fa-f0-9]{128}$
      example: >-
        36b7efd913ca4cf880b8eeac5093fa27b0825906c600685b6abdd6566e6cfe8f2d2810619d29b5dbefd5d74abce25d58b81b251baddb9c3871cf0d6967deaae2
    ActGranteesOperationResponse:
      type: object
      properties:
        ref:
          $ref: '#/components/schemas/SwarmEncryptedReference'
        historyref:
          $ref: '#/components/schemas/SwarmEncryptedReference'
    ProblemDetails:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        reasons:
          type: array
          nullable: true
          description: List of reasons for the error message.
          items:
            type: string
    ActGranteesPatchRequest:
      type: object
      properties:
        add:
          type: array
          items:
            $ref: '#/components/schemas/PublicKey'
          description: List of grantees to add
        revoke:
          type: array
          items:
            $ref: '#/components/schemas/PublicKey'
          description: List of grantees to revoke future access from
    SwarmAddress:
      type: string
      pattern: ^[A-Fa-f0-9]{64}$
      example: 36b7efd913ca4cf880b8eeac5093fa27b0825906c600685b6abdd6566e6cfe8f
    Uid:
      type: integer
    DomainName:
      type: string
      pattern: ^[A-Za-z0-9]+\.[A-Za-z0-9]+$
      example: swarm.eth
    SwarmReference:
      oneOf:
        - $ref: '#/components/schemas/SwarmAddress'
        - $ref: '#/components/schemas/SwarmEncryptedReference'
        - $ref: '#/components/schemas/DomainName'
    ReferenceResponse:
      type: object
      properties:
        reference:
          $ref: '#/components/schemas/SwarmReference'
    Duration:
      description: Time duration in Go time.Duration format (e.g., 5.0018ms)
      type: string
      example: 5.0018ms
    HexString:
      type: string
      pattern: ^([A-Fa-f0-9]+)$
      example: cf880b8eeac5093fa27b0825906c600685
    FileName:
      type: string
    DateTime:
      type: string
      format: date-time
      example: '2020-06-11T11:26:42.6969797+02:00'
    NewTagResponse:
      type: object
      properties:
        uid:
          $ref: '#/components/schemas/Uid'
        address:
          $ref: '#/components/schemas/SwarmAddress'
          description: >-
            Root reference associated with the tag once the upload is finalized;
            zero value before that.
        startedAt:
          $ref: '#/components/schemas/DateTime'
        split:
          type: integer
          description: Number of chunks created by the splitter.
        seen:
          type: integer
          description: >-
            Number of chunks that are already uploaded with same reference and
            same postage batch. These don't need to be synced again.
        stored:
          type: integer
          description: >-
            Number of chunks that were stored locally as they lie in the
            uploader node's neighborhood. This is only applicable for full
            nodes.
        sent:
          type: integer
          description: >-
            Number of chunks sent on the network to peers as a part of the
            upload. Chunks could be sent multiple times because of failures or
            replication.
        synced:
          type: integer
          description: >-
            Number of chunks that were pushed with a valid receipt. The receipt
            will also show if they were stored at the correct depth.
    TagsList:
      type: object
      properties:
        tags:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/NewTagResponse'
    Address:
      type: object
      properties:
        address:
          $ref: '#/components/schemas/SwarmAddress'
    Response:
      type: object
      properties:
        message:
          type: string
