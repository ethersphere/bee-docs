          name: label
          schema:
            type: string
          required: false
          description: An optional label for this batch
        - in: header
          name: immutable
          schema:
            type: boolean
          required: false
        - $ref: '#/components/parameters/GasPriceParameter'
        - $ref: '#/components/parameters/GasLimitParameter'
