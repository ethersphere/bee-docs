openapi: 3.0.3
info:
  version: 8.1.0
  title: Bee API
  description: >-
    API endpoints for interacting with the Swarm network, supporting file
    operations, messaging, and node management
externalDocs:
  description: Browse the documentation at the Swarm Docs
  url: https://docs.ethswarm.org
servers:
  - url: http://{apiRoot}:{port}/v1
    variables:
      apiRoot:
        default: localhost
        description: Base address of the local bee node main API
      port:
        default: '1633'
        description: Service port provided in bee node config
  - url: http://{apiRoot}:{port}
    variables:
      apiRoot:
        default: localhost
        description: Base address of the local bee node main API
      port:
        default: '1633'
        description: Service port provided in bee node config
paths:
  /grantee:
    post:
      summary: Create a grantee list
      tags:
        - ACT
      parameters:
        - in: header
          schema:
            $ref: '#/components/schemas/SwarmPostageBatchId'
          name: swarm-postage-batch-id
          required: true
        - in: header
          schema:
            $ref: '#/components/schemas/SwarmTagParameter'
          name: swarm-tag
          required: false
        - in: header
          schema:
            $ref: '#/components/schemas/SwarmPinParameter'
          name: swarm-pin
          required: false
        - in: header
          schema:
            $ref: '#/components/schemas/SwarmDeferredUpload'
          name: swarm-deferred-upload
          required: false
        - in: header
          schema:
            $ref: '#/components/schemas/SwarmActHistoryAddress'
          name: swarm-act-history-address
          required: false
        - in: header
          schema:
            $ref: '#/components/schemas/SwarmRedundancyLevelParameter'
          name: swarm-redundancy-level
          required: false
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActGranteesCreateRequest'
      responses:
        '201':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActGranteesOperationResponse'
        '400':
          $ref: '#/components/responses/400'
        '500':
          $ref: '#/components/responses/500'
  /grantee/{address}:
    get:
      summary: Get the grantee list
      tags:
        - ACT
      parameters:
        - in: path
          name: address
          schema:
            $ref: '#/components/schemas/SwarmEncryptedReference'
          required: true
          description: Grantee list reference
        - in: header
          schema:
            $ref: '#/components/schemas/SwarmRedundancyLevelParameter'
          name: swarm-redundancy-level
          required: false
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PublicKey'
        '404':
          $ref: '#/components/responses/404'
        '500':
          $ref: '#/components/responses/500'
    patch:
      summary: Update the grantee list
      description: Add or remove grantees from an existing grantee list
      tags:
        - ACT
      parameters:
        - in: path
          name: address
          schema:
            $ref: '#/components/schemas/SwarmEncryptedReference'
          required: true
          description: Grantee list reference
        - in: header
          schema:
            $ref: '#/components/schemas/SwarmActHistoryAddress'
          name: swarm-act-history-address
          required: true
        - in: header
          schema:
            $ref: '#/components/schemas/SwarmPostageBatchId'
          name: swarm-postage-batch-id
          required: true
        - in: header
          schema:
            $ref: '#/components/schemas/SwarmTagParameter'
          name: swarm-tag
          required: false
        - in: header
          schema:
            $ref: '#/components/schemas/SwarmPinParameter'
          name: swarm-pin
          required: false
        - in: header
          schema:
            $ref: '#/components/schemas/SwarmDeferredUpload'
          name: swarm-deferred-upload
          required: false
        - in: header
          schema:
            $ref: '#/components/schemas/SwarmRedundancyLevelParameter'
          name: swarm-redundancy-level
          required: false
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActGranteesPatchRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActGranteesOperationResponse'
        '400':
          $ref: '#/components/responses/400'
        '500':
          $ref: '#/components/responses/500'
  /bytes:
    post:
      summary: Upload data
      tags:
        - Bytes
      parameters:
        - $ref: '#/components/parameters/SwarmPostageBatchId'
        - $ref: '#/components/parameters/SwarmTagParameter'
        - $ref: '#/components/parameters/SwarmPinParameter'
        - $ref: '#/components/parameters/SwarmDeferredUpload'
        - $ref: '#/components/parameters/SwarmEncryptParameter'
        - $ref: '#/components/parameters/SwarmRedundancyLevelParameter'
        - $ref: '#/components/parameters/SwarmAct'
        - $ref: '#/components/parameters/SwarmActHistoryAddress'
      requestBody:
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        '201':
          description: OK
          headers:
            swarm-tag:
              $ref: '#/components/headers/SwarmTag'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReferenceResponse'
        '400':
          $ref: '#/components/responses/400'
        '402':
          $ref: '#/components/responses/402'
        '500':
          $ref: '#/components/responses/500'
        default:
          description: Default response
  /bytes/{address}:
    get:
      summary: Retrieve data by reference
      tags:
        - Bytes
      parameters:
        - in: path
          name: address
          schema:
            $ref: '#/components/schemas/SwarmReference'
          required: true
          description: Swarm address reference to content
        - $ref: '#/components/parameters/SwarmCache'
        - $ref: '#/components/parameters/SwarmRedundancyStrategyParameter'
        - $ref: '#/components/parameters/SwarmRedundancyFallbackModeParameter'
        - $ref: '#/components/parameters/SwarmRedundancyLevelParameter'
        - $ref: '#/components/parameters/SwarmChunkRetrievalTimeoutParameter'
        - $ref: '#/components/parameters/SwarmLookaheadBufferSizeParameter'
        - $ref: '#/components/parameters/SwarmActTimestamp'
        - $ref: '#/components/parameters/SwarmActPublisher'
        - $ref: '#/components/parameters/SwarmActHistoryAddress'
      responses:
        '200':
          description: Retrieved content specified by reference
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '400':
          $ref: '#/components/responses/400'
        default:
          description: Default response
    head:
      summary: >-
        Retrieve headers containing the content type and length for the
        reference
      tags:
        - Bytes
      parameters:
        - in: path
          name: address
          schema:
            $ref: '#/components/schemas/SwarmAddress'
          required: true
          description: Swarm address of chunk
        - $ref: '#/components/parameters/SwarmActTimestamp'
        - $ref: '#/components/parameters/SwarmActPublisher'
        - $ref: '#/components/parameters/SwarmActHistoryAddress'
      responses:
        '200':
          description: The chunk exists.
          headers:
            Content-Type:
              description: The MIME type of the resource (e.g., application/octet-stream).
              schema:
                type: string
                example: application/octet-stream
            Content-Length:
              description: The size of the chunk in bytes.
              schema:
                type: integer
                example: 1024
            Access-Control-Expose-Headers:
              description: Headers exposed for CORS.
              schema:
                type: string
                example: Accept-Ranges, Content-Encoding
        '400':
          $ref: '#/components/responses/400'
        '404':
          $ref: '#/components/responses/404'
        default:
          description: Default response
  /chunks:
    post:
      summary: Upload a chunk
      tags:
        - Chunk
      parameters:
        - $ref: '#/components/parameters/SwarmTagParameter'
        - in: header
          name: swarm-postage-batch-id
          schema:
            $ref: '#/components/schemas/SwarmPostageBatchId'
          required: false
        - $ref: '#/components/parameters/SwarmPostageStamp'
        - $ref: '#/components/parameters/SwarmAct'
        - $ref: '#/components/parameters/SwarmActHistoryAddress'
      requestBody:
        description: Chunk binary data containing at least 8 bytes.
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        '201':
          description: OK
          headers:
            swarm-tag:
              description: Tag UID from the request `swarm-tag` header if provided.
              schema:
                $ref: '#/components/schemas/Uid'
            swarm-act-history-address:
              $ref: '#/components/headers/SwarmActHistoryAddress'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReferenceResponse'
        '400':
          $ref: '#/components/responses/400'
        '402':
          $ref: '#/components/responses/402'
        '500':
          $ref: '#/components/responses/500'
        default:
          description: Default response
  /chunks/stream:
    get:
      summary: Stream chunks for upload
      description: >-
        Establishes a WebSocket connection for streaming chunks. Each uploaded
        chunk receives a binary acknowledgment (`0`). Chunks are sent as binary
        messages. When a tag is specified, chunks are stored locally and
        uploaded to the network after the stream closes. Without a tag, chunks
        are directly uploaded to the network as they arrive.
      tags:
        - Chunk
      parameters:
        - $ref: '#/components/parameters/SwarmTagParameter'
        - in: query
          name: swarm-tag
          schema:
            $ref: '#/components/schemas/Uid'
          required: false
          description: >-
            Associate upload with an existing Tag UID (use when WebSocket client
            cannot set custom headers)
        - in: header
          name: swarm-postage-batch-id
          description: >-
            ID of Postage Batch that is used to upload data with. Optional when
            chunks include pre-signed postage stamps.
          required: false
          schema:
            $ref: '#/components/schemas/SwarmAddress'
      responses:
        '200':
          description: Connection established
        '400':
          $ref: '#/components/responses/400'
        default:
          description: Default response
  /bzz:
    post:
      summary: Upload a file or collection of files
      description: >-
        Upload single files or collections of files. For a single file,
        `Content-Type` is optional: when present it is stored as metadata as-is;
        when absent the server infers a type from the start of the body. To
        upload a collection, send a multipart request with files in the form
        data with appropriate headers. Tar files can be uploaded with the
        `swarm-collection` header to extract and upload the directory structure.
        Without the `swarm-collection` header, requests are treated as single
        file uploads. Multipart requests are always treated as collections; use
        the `swarm-index-document` header to specify a single file to serve.
      tags:
        - BZZ
      parameters:
        - in: query
          name: name
          schema:
            $ref: '#/components/schemas/FileName'
          required: false
          description: Filename when uploading single file
        - $ref: '#/components/parameters/SwarmTagParameter'
        - $ref: '#/components/parameters/SwarmPinParameter'
        - $ref: '#/components/parameters/SwarmEncryptParameter'
        - $ref: '#/components/parameters/ContentTypePreserved'
        - $ref: '#/components/parameters/SwarmCollection'
        - $ref: '#/components/parameters/SwarmIndexDocumentParameter'
        - $ref: '#/components/parameters/SwarmErrorDocumentParameter'
        - $ref: '#/components/parameters/SwarmPostageBatchId'
        - $ref: '#/components/parameters/SwarmDeferredUpload'
        - $ref: '#/components/parameters/SwarmRedundancyLevelParameter'
        - $ref: '#/components/parameters/SwarmAct'
        - $ref: '#/components/parameters/SwarmActHistoryAddress'
      requestBody:
        content:
          multipart/form-data:
            schema:
              properties:
                file:
                  type: array
                  items:
                    type: string
                    format: binary
          application/octet-stream:
            schema:
              type: string
              format: binary
          application/x-tar:
            schema:
              type: string
              format: binary
      responses:
        '201':
          description: OK
          headers:
            swarm-tag:
              $ref: '#/components/headers/SwarmTag'
            etag:
              $ref: '#/components/headers/ETag'
            swarm-act-history-address:
              $ref: '#/components/headers/SwarmActHistoryAddress'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReferenceResponse'
        '400':
          $ref: '#/components/responses/400'
        '402':
          $ref: '#/components/responses/402'
        '500':
          $ref: '#/components/responses/500'
        default:
          description: Default response
  /bzz/{address}:
    get:
      summary: Retrieve a file or index document from a collection
      tags:
        - BZZ
      parameters:
        - in: path
          name: address
          schema:
            $ref: '#/components/schemas/SwarmReference'
          required: true
          description: Swarm address of content
        - $ref: '#/components/parameters/SwarmCache'
        - $ref: '#/components/parameters/SwarmRedundancyStrategyParameter'
        - $ref: '#/components/parameters/SwarmRedundancyFallbackModeParameter'
        - $ref: '#/components/parameters/SwarmRedundancyLevelParameter'
        - $ref: '#/components/parameters/SwarmChunkRetrievalTimeoutParameter'
        - $ref: '#/components/parameters/SwarmLookaheadBufferSizeParameter'
        - $ref: '#/components/parameters/SwarmActTimestamp'
        - $ref: '#/components/parameters/SwarmActPublisher'
        - $ref: '#/components/parameters/SwarmActHistoryAddress'
      responses:
        '200':
          description: OK
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
          headers:
            swarm-feed-resolved-version:
              $ref: '#/components/headers/SwarmFeedResolvedVersion'
        '400':
          $ref: '#/components/responses/400'
        '404':
          $ref: '#/components/responses/404'
        '500':
          $ref: '#/components/responses/500'
        default:
          description: Default response
    head:
      summary: Retrieve headers with content type and length for the reference
      tags:
        - BZZ
      parameters:
        - in: path
          name: address
          schema:
            $ref: '#/components/schemas/SwarmAddress'
          required: true
          description: Swarm address of chunk
        - $ref: '#/components/parameters/SwarmActTimestamp'
        - $ref: '#/components/parameters/SwarmActPublisher'
        - $ref: '#/components/parameters/SwarmActHistoryAddress'
      responses:
        '200':
          description: Chunk exists
        '400':
          $ref: '#/components/responses/400'
        '404':
          $ref: '#/components/responses/404'
        default:
          description: Default response
  /bzz/{address}/{path}:
    get:
      summary: Retrieve a file from a collection by path
      tags:
        - BZZ
      parameters:
        - in: path
          name: address
          schema:
            $ref: '#/components/schemas/SwarmReference'
          required: true
          description: Swarm address of content
        - in: path
          name: path
          schema:
            type: string
          required: true
          description: Path to the file in the collection.
        - $ref: '#/components/parameters/SwarmRedundancyStrategyParameter'
        - $ref: '#/components/parameters/SwarmRedundancyFallbackModeParameter'
        - $ref: '#/components/parameters/SwarmChunkRetrievalTimeoutParameter'
        - $ref: '#/components/parameters/SwarmRedundancyLevelParameter'
        - $ref: '#/components/parameters/SwarmCache'
        - $ref: '#/components/parameters/SwarmLookaheadBufferSizeParameter'
      responses:
        '200':
          description: OK
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
          headers:
            swarm-feed-resolved-version:
              $ref: '#/components/headers/SwarmFeedResolvedVersion'
        '400':
          $ref: '#/components/responses/400'
        '404':
          $ref: '#/components/responses/404'
        '500':
          $ref: '#/components/responses/500'
        default:
          description: Default response
  /tags:
    get:
      summary: Get list of tags
      tags:
        - Tag
      parameters:
        - in: query
          name: offset
          schema:
            type: integer
            minimum: 0
            default: 0
          required: false
          description: >-
            The number of items to skip before starting to collect the result
            set.
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 100
          required: false
          description: The numbers of items to return.
      responses:
        '200':
          description: List of tags
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TagsList'
        '500':
          $ref: '#/components/responses/500'
        default:
          description: Default response
    post:
      summary: Create Tag
      tags:
        - Tag
      description: >-
        Tags can be thought of as upload sessions which can be tracked using the
        tags endpoint. It will keep track of the chunks that are uploaded as
        part of the tag and will push them out to the network once a done split
        is called on the Tag. This happens internally if you use the
        `Swarm-Deferred-Upload` header.
      responses:
        '201':
          description: New Tag Info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NewTagResponse'
        '500':
          $ref: '#/components/responses/500'
        default:
          description: Default response
  /tags/{id}:
    get:
      summary: Get Tag information using Uid
      tags:
        - Tag
      parameters:
        - in: path
          name: id
          schema:
            $ref: '#/components/schemas/Uid'
          required: true
          description: Uid
      responses:
        '200':
          description: Tag info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NewTagResponse'
        '400':
          $ref: '#/components/responses/400'
        '404':
          $ref: '#/components/responses/404'
        '500':
          $ref: '#/components/responses/500'
        default:
          description: Default response
    delete:
      summary: Delete Tag information using Uid
      tags:
        - Tag
      parameters:
        - in: path
          name: id
          schema:
            $ref: '#/components/schemas/Uid'
          required: true
          description: Uid
      responses:
        '204':
          $ref: '#/components/responses/204'
        '400':
          $ref: '#/components/responses/400'
        '404':
          $ref: '#/components/responses/404'
        '500':
          $ref: '#/components/responses/500'
        default:
          description: Default response
    patch:
      summary: >-
        Update Total Count and swarm hash for a tag of an input stream of
        unknown size using Uid
      tags:
        - Tag
      parameters:
        - in: path
          name: id
          schema:
            $ref: '#/components/schemas/Uid'
          required: true
          description: Uid
      requestBody:
        description: Can contain swarm hash to use for the tag
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Address'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Response'
        '404':
          $ref: '#/components/responses/404'
        '500':
          $ref: '#/components/responses/500'
        default:
          description: Default response
  /pins/{reference}:
    parameters:
      - in: path
        name: reference
        schema:
          $ref: '#/components/schemas/SwarmOnlyReference'
        required: true
        description: Swarm reference of the root hash
    post:
      summary: Pin a root hash by reference
      tags:
        - Pinning
      parameters:
        - in: header
          schema:
            $ref: '#/components/schemas/SwarmRedundancyLevelParameter'
          name: swarm-redundancy-level
          required: false
      responses:
        '200':
          description: Pin already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Response'
        '201':
          description: New pin with root reference was created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Response'
        '400':
          $ref: '#/components/responses/400'
        '404':
          $ref: '#/components/responses/404'
        '500':
          $ref: '#/components/responses/500'
        default:
          description: Default response
    delete:
      summary: Unpin a root hash by reference
      tags:
        - Pinning
      responses:
        '200':
          description: Root hash has been unpinned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Response'
        '400':
          $ref: '#/components/responses/400'
        '500':
          $ref: '#/components/responses/500'
        default:
          description: Default response
    get:
      summary: Get the pinning status of a root hash
      tags:
        - Pinning
      responses:
        '200':
          description: The pinned root hash reference
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SwarmOnlyReference'
        '400':
          $ref: '#/components/responses/400'
        '404':
          $ref: '#/components/responses/404'
        '500':
          $ref: '#/components/responses/500'
        default:
          description: Default response
  /pins:
    get:
      summary: Get the list of pinned root hash references
      tags:
        - Pinning
      responses:
        '200':
          description: List of pinned root hash references
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SwarmOnlyReferencesList'
        '500':
          $ref: '#/components/responses/500'
        default:
          description: Default response
  /pins/check:
    get:
      summary: Validate pinned chunks integrity
      description: >
        Returns a stream of newline-delimited JSON objects (NDJSON), one per
        pinned reference checked.

        The response uses chunked transfer encoding; clients should parse each
        line as an independent

        `PinIntegrityResponse` object rather than buffering the body into a
        single JSON value.
      tags:
        - Pinning
      parameters:
        - in: query
          name: ref
          schema:
            $ref: '#/components/schemas/SwarmOnlyReference'
          required: false
          description: >-
            Optional reference to check; if not provided, all pinned references
            are checked
      responses:
        '200':
          description: NDJSON stream of integrity results, one object per line
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PinCheckResponse'
        '500':
          $ref: '#/components/responses/500'
        default:
          description: Default response
  /pss/send/{topic}/{targets}:
    post:
      summary: Send a message using the Postal Service for Swarm
      tags:
        - Postal Service for Swarm
      parameters:
        - in: path
          name: topic
          schema:
            $ref: '#/components/schemas/PssTopic'
          required: true
          description: Topic name
        - in: path
          name: targets
          schema:
            $ref: '#/components/schemas/PssTargets'
          required: true
          description: >-
            Target message address prefix. If multiple targets are specified,
            only one would be matched.
        - in: query
          name: recipient
          schema:
            $ref: '#/components/schemas/PssRecipient'
          required: false
          description: Recipient publickey
        - $ref: '#/components/parameters/SwarmPostageBatchId'
      responses:
        '201':
          description: Subscribed to topic
        '400':
          $ref: '#/components/responses/400'
        '402':
          $ref: '#/components/responses/402'
        '500':
          $ref: '#/components/responses/500'
        default:
          description: Default response
  /pss/subscribe/{topic}:
    get:
      summary: Subscribe to messages on a topic
      tags:
        - Postal Service for Swarm
      parameters:
        - in: path
          name: topic
          schema:
            $ref: '#/components/schemas/PssTopic'
          required: true
          description: Topic name
      responses:
        '200':
          description: >-
            Establishes a WebSocket subscription for incoming messages on the
            topic
        '500':
          $ref: '#/components/responses/500'
        default:
          description: Default response
  /gsoc/subscribe/{address}:
    get:
      summary: Subscribe to GSOC payloads
      tags:
        - GSOC
      parameters:
        - in: path
          name: address
          schema:
            $ref: '#/components/schemas/SwarmAddress'
          required: true
          description: Single Owner Chunk address (which may have multiple payloads)
      responses:
        '200':
          description: >-
            Establishes a WebSocket subscription for incoming messages on the
            Single Owner Chunk address
        '500':
          $ref: '#/components/responses/500'
        default:
          description: Default response
  /soc/{owner}/{id}:
    post:
      summary: Upload a Single Owner Chunk
      tags:
        - Single owner chunk
      parameters:
        - in: path
          name: owner
          schema:
            $ref: '#/components/schemas/EthereumAddress'
          required: true
          description: Ethereum address of the chunk owner
        - in: path
          name: id
          schema:
            $ref: '#/components/schemas/HexString'
          required: true
          description: Unique identifier for the chunk
        - in: query
          name: sig
          schema:
            $ref: '#/components/schemas/HexString'
          required: true
          description: Signature
        - in: header
          name: swarm-postage-batch-id
          schema:
            $ref: '#/components/schemas/SwarmPostageBatchId'
          required: false
          description: >-
            ID of the postage batch to use. Either this or `swarm-postage-stamp`
            must be supplied.
        - $ref: '#/components/parameters/SwarmPostageStamp'
        - $ref: '#/components/parameters/SwarmTagParameter'
        - $ref: '#/components/parameters/SwarmPinParameter'
        - $ref: '#/components/parameters/SwarmDeferredUpload'
        - $ref: '#/components/parameters/SwarmAct'
        - $ref: '#/components/parameters/SwarmActHistoryAddress'
      requestBody:
        required: true
        description: >-
          The SOC binary data, composed of the span (8 bytes) and up to 4KB of
          payload.
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReferenceResponse'
          headers:
            swarm-tag:
              description: >-
                Tag UID, returned when an upload session is in use (either
                because `swarm-tag` was supplied, `swarm-deferred-upload`
                requested deferred mode, or `swarm-pin` was set).
              schema:
                $ref: '#/components/schemas/Uid'
            swarm-act-history-address:
              $ref: '#/components/headers/SwarmActHistoryAddress'
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '402':
          $ref: '#/components/responses/402'
        '404':
          $ref: '#/components/responses/404'
        '500':
          $ref: '#/components/responses/500'
        default:
          description: Default response
    get:
